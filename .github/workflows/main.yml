name: Build Media3 Decoder AV1
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Media3 Source
        uses: actions/checkout@v4
        with:
          repository: 'androidx/media'
          ref: '1.5.1' # Garde bien '1.5.1' uniquement pour éviter le crash git

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install Compilers (Ninja, nasm)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build nasm

      - name: Compile AAR
        run: ./gradlew :lib-decoder-av1:assembleRelease

      - name: Debug - Localiser le fichier AAR
        run: |
          echo "=== RECHERCHE DU FICHIER AAR ==="
          find . -name "*.aar"
          echo "=== STRUCTURE DU DOSSIER DE COMPILATION ==="
          ls -R libraries/decoder_av1/build/outputs/ || echo "Dossier outputs introuvable"

      - name: Upload Finished AAR
        uses: actions/upload-artifact@v4
        with:
          name: media3-decoder-av1-local
          path: |
            **/*.aar
