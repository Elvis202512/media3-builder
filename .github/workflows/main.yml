name: Build Native dav1d Decoder
on: [workflow_dispatch]

jobs:
  build-dav1d:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install Build Tools (Meson, Ninja, NASM)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build nasm python3-pip python3-setuptools
          # Installation propre de Meson
          pip3 install --user meson

      - name: Run dav1d Cross-Compilation Script
        run: |
          # Ajout de Meson au PATH local de GitHub Actions
          export PATH="$HOME/.local/bin:$PATH"
          
          # Utilisation de la version stable de l'NDK présente sur le runner
          NDK_PATH="/usr/local/lib/android/sdk/ndk/25.1.8937393"
          ANDROID_API=21
          
          mkdir -p prebuilt/dav1d
          PREBUILT_DIR=$(readlink -f prebuilt/dav1d)
          
          # 1. Clonage propre du dépôt officiel de VideoLAN dav1d
          if [ ! -d dav1d ]; then
            git -c http.sslVerify=false clone https://code.videolan.org/videolan/dav1d -b 1.5.3
          fi
          
          # 2. Boucle automatique sur toutes les architectures Android requises
          ARCHS=("arm64" "arm" "x86" "x86_64")
          
          for ARCH in "${ARCHS[@]}"; do
            echo "========================================="
            echo "   COMPILATION DE L'ARCHITECTURE : $ARCH"
            echo "========================================="
            
            case "${ARCH}" in
              'arm')
                ARCH_TRIPLET='arm-linux-androideabi'
                ARCH_TRIPLET_VARIANT='armv7a-linux-androideabi'
                ABI='armeabi-v7a'
                CPU_FAMILY='arm'
                ;;
              'arm64')
                ARCH_TRIPLET='aarch64-linux-android'
                ARCH_TRIPLET_VARIANT=$ARCH_TRIPLET
                ABI='arm64-v8a'
                CPU_FAMILY='aarch64'
                ;;
              'x86')
                ARCH_TRIPLET='i686-linux-android'
                ARCH_TRIPLET_VARIANT=$ARCH_TRIPLET
                ABI='x86'
                CPU_FAMILY='x86'
                ;;
              'x86_64')
                ARCH_TRIPLET='x86_64-linux-android'
                ARCH_TRIPLET_VARIANT=$ARCH_TRIPLET
                ABI='x86_64'
                CPU_FAMILY='x86_64'
                ;;
            esac
            
            CROSS_PREFIX="${NDK_PATH}/toolchains/llvm/prebuilt/linux-x86_64/bin"
            dir_name="build-${ABI}"
            user_config="android_cross_${ABI}.txt"
            
            # Génération dynamique du fichier de cross-compilation Meson
            cat <<EOF > $user_config
[binaries]
name = 'android'
c     = '${CROSS_PREFIX}/${ARCH_TRIPLET_VARIANT}${ANDROID_API}-clang'
cpp   = '${CROSS_PREFIX}/${ARCH_TRIPLET_VARIANT}${ANDROID_API}-clang++'
ar    = '${CROSS_PREFIX}/llvm-ar'
ld    = '${CROSS_PREFIX}/${ARCH_TRIPLET_VARIANT}${ANDROID_API}-clang++'
strip = '${CROSS_PREFIX}/${ARCH_TRIPLET}-strip'

[properties]
needs_exe_wrapper = true
c_link_args = ['-Wl,-z,max-page-size=16384']
cpp_link_args = ['-Wl,-z,max-page-size=16384']

[host_machine]
system = 'linux'
cpu_family = '${CPU_FAMILY}'
cpu = '${CPU_FAMILY}'
endian = 'little'
EOF

            cd dav1d
            rm -rf "../${dir_name}" # Nettoyage complet
            
            # Lancement de Meson Setup
            meson setup "../${dir_name}" --buildtype release --cross-file "../${user_config}" -Denable_tools=false -Denable_tests=false
            
            # Compilation native ultra-rapide avec Ninja
            ninja -C "../${dir_name}"
            
            # Ton Hack SONAME : suppression de l'extension de version (.so.7 -> .so) pour la compatibilité Android
            sed -i 's:libdav1d\.so\.[0-9]:libdav1d\.so\x0\x0:' $(readlink -f "../${dir_name}/src/libdav1d.so")
            
            # Exportation du fichier binaire compilé
            mkdir -p "${PREBUILT_DIR}/lib/${ABI}"
            cp "../${dir_name}/src/libdav1d.so" "${PREBUILT_DIR}/lib/${ABI}/libdav1d.so"
            
            cd ..
          done
          
          # 3. Extraction et centralisation des fichiers d'en-tête (.h) requis pour ton projet
          mkdir -p "${PREBUILT_DIR}/include/dav1d"
          cp dav1d/include/dav1d/*.h "${PREBUILT_DIR}/include/dav1d/"
          cp build-arm64-v8a/include/vcs_version.h "${PREBUILT_DIR}/include/dav1d/" 2>/dev/null || true
          
          echo "=== [SUCCESS] TOUTES LES LIBRARIES SONT PRÊTES IN THE POCKET ! ==="

      - name: Upload Prebuilt dav1d Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libdav1d-android-prebuilt
          path: ./prebuilt/dav1d/
