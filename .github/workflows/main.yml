name: Build Media3 Decoder AV1

on:
  workflow_dispatch:  # Lancer manuellement

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Media3 Source
        uses: actions/checkout@v4
        with:
          repository: 'androidx/media'
          ref: '1.5.1'
          fetch-depth: 0

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '14.0'

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses

      - name: Fetch dav1d (AV1 decoder)
        run: |
          cd libraries/decoder_av1/src/main/jni
          chmod +x ./fetch_dav1d.sh
          ./fetch_dav1d.sh

      - name: Build Media3 AV1 Decoder AAR
        run: |
          ./gradlew :libraries:decoder_av1:assembleRelease \
            --no-daemon \
            --parallel

      - name: Upload AAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: media3-decoder-av1-1.5.1
          path: libraries/decoder_av1/build/outputs/aar/*-release.aar
          retention-days: 30
