name: Build Media3 Decoder AV1 Real
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Media3 Source
        uses: actions/checkout@v4
        with:
          repository: 'androidx/media'
          ref: '1.5.1'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install Compilers (Ninja, nasm)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build nasm

      - name: Clone Google libgav1 & Abseil Dependencies
        run: |
          echo "=== 1. Clonage du moteur principal libgav1 ==="
          git clone https://chromium.googlesource.com/codecs/libgav1 libraries/decoder_av1/src/main/jni/libgav1
          
          echo "=== 2. Clonage de la dépendance obligatoire Abseil ==="
          mkdir -p libraries/decoder_av1/src/main/jni/libgav1/third_party
          git clone https://github.com/abseil/abseil-cpp.git libraries/decoder_av1/src/main/jni/libgav1/third_party/abseil-cpp

      - name: Compile Real AAR with Native Libs
        run: ./gradlew :lib-decoder-av1:assembleRelease

      - name: Upload Finished Real AAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: media3-decoder-gav1-real
          path: |
            **/*.aar

      - name: Print CMake Logs on Failure
        if: failure()
        run: |
          echo "=== [DIAGNOSTIC] AFFICHAGE DES ERREURS DE COMPILATION C++ ==="
          find libraries/decoder_av1/.cxx -name "CMakeError.log" -exec cat {} \; || true
          find libraries/decoder_av1/.cxx -name "cmake_output.txt" -exec cat {} \; || true
