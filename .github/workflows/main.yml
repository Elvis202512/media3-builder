name: Build Media3 AV1 (libgav1) Fat AAR
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Media3 (v1.5.1)
        uses: actions/checkout@v4
        with:
          repository: androidx/media
          ref: '1.5.1'
          path: media

      - name: 2. Checkout cpu_features (Requis par Google)
        uses: actions/checkout@v4
        with:
          repository: google/cpu_features
          ref: 'v0.9.0'
          path: media/libraries/decoder_av1/src/main/jni/cpu_features

      - name: 3. Checkout libgav1 (Le décodeur officiel)
        uses: actions/checkout@v4
        with:
          repository: google/libgav1
          ref: 'v0.19.0'
          path: media/libraries/decoder_av1/src/main/jni/libgav1

      - name: 4. Checkout abseil-cpp (Requis par libgav1)
        uses: actions/checkout@v4
        with:
          repository: abseil/abseil-cpp
          ref: '20230802.1'
          path: media/libraries/decoder_av1/src/main/jni/libgav1/third_party/abseil-cpp

      - name: 5. Configuration de Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 6. Installation des outils de compilation native
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: 7. Rendre le script Gradle exécutable
        run: chmod +x media/gradlew

      - name: 8. Compilation automatique de toutes les architectures
        run: |
          cd media
          ./gradlew :lib-decoder-av1:assembleRelease

      - name: 9. Récupérer le Fat AAR complet
        uses: actions/upload-artifact@v4
        with:
          name: decoder-av1-official-fat
          path: media/libraries/decoder_av1/**/outputs/aar/*.aar
