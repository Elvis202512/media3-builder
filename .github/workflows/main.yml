name: Build Media3 VP9 (libvpx) Fat AAR
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Code source de Media3 (v1.5.1)
        uses: actions/checkout@v4
        with:
          repository: androidx/media
          ref: '1.5.1'
          path: media

      - name: 2. Téléchargement de libvpx (Fix Google Source)
        run: |
          JNI_DIR="media/libraries/decoder_vp9/src/main/jni"
          mkdir -p "$JNI_DIR"
          cd "$JNI_DIR"
          
          # Télécharger libvpx depuis le serveur officiel de Google/WebM
          git clone --depth 1 https://chromium.googlesource.com/webm/libvpx libvpx

      - name: 3. Configuration de Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 4. Installation de CMake et Ninja
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: 5. Configuration de l'environnement Android
        uses: android-actions/setup-android@v3

      - name: 6. Rendre le script Gradle exécutable
        run: chmod +x media/gradlew

      - name: 7. Compilation automatique (Fat AAR Multi-ABI VP9)
        run: |
          cd media
          ./gradlew :lib-decoder-vp9:assembleRelease

      - name: 8. Récupérer le Fat AAR complet
        uses: actions/upload-artifact@v4
        with:
          name: decoder-vp9-official-fat
          path: media/libraries/decoder_vp9/**/outputs/aar/*.aar
