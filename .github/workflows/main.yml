name: Build Media3 Decoder AV1 Inspect
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Media3 Source
        uses: actions/checkout@v4
        with:
          repository: 'androidx/media'
          ref: '1.5.1'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install Compilers (Ninja, nasm)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build nasm

      - name: Inspect AV1 Directory Structure
        run: |
          echo "=== LISTE COMPLÈTE DES FICHIERS DANS DECODER_AV1 ==="
          ls -R libraries/decoder_av1/

      - name: Compile AAR
        run: ./gradlew :lib-decoder-av1:assembleRelease

      - name: Upload Finished AAR
        uses: actions/upload-artifact@v4
        with:
          name: media3-decoder-av1-inspect
          path: |
            **/*.aar
