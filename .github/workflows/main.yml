name: Diagnostic Media3 AV1
on: [workflow_dispatch]

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Media3 Source
        uses: actions/checkout@v4
        with:
          repository: 'androidx/media'
          ref: '1.5.1'

      - name: Structure du module AV1
        run: |
          echo "=== 1. LISTE DE TOUS LES FICHIERS DE L'EXTENSION ==="
          find libraries/decoder_av1 -type f
          
      - name: Inspection du script de build Gradle
        run: |
          echo "=== 2. CONTENU DU CONFIGURATION GRADLE ==="
          if [ -f "libraries/decoder_av1/build.gradle" ]; then
            cat libraries/decoder_av1/build.gradle
          elif [ -f "libraries/decoder_av1/build.gradle.kts" ]; then
            cat libraries/decoder_av1/build.gradle.kts
          else
            echo "Fichier de build introuvable !"
          fi
