name: Build Media3 Decoder AV1 Real
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Media3 Source
        uses: actions/checkout@v4
        with:
          repository: 'androidx/media'
          ref: '1.5.1'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install Compilers (Ninja, nasm)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build nasm

      - name: Clone Official Google libgav1 Source
        run: |
          echo "=== Clonage du moteur libgav1 ==="
          git clone https://chromium.googlesource.com/codecs/libgav1 libraries/decoder_av1/src/main/jni/libgav1

      - name: Compile Real AAR with Native Libs
        run: ./gradlew :lib-decoder-av1:assembleRelease

      - name: Upload Finished Real AAR
        uses: actions/upload-artifact@v4
        with:
          name: media3-decoder-gav1-real
          path: |
            **/*.aar
