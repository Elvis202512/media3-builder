name: Build Media3 Decoder AV1 - Strategy 1 (Old Runner)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Media3 Source
        uses: actions/checkout@v4
        with:
          repository: 'androidx/media'
          ref: '1.5.1'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install Compilers (Ninja, nasm)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build nasm

      - name: Clone Google libgav1 & Abseil Dependencies
        run: |
          git clone --depth 1 https://chromium.googlesource.com/codecs/libgav1 libraries/decoder_av1/src/main/jni/libgav1
          mkdir -p libraries/decoder_av1/src/main/jni/libgav1/third_party
          git clone --depth 1 https://github.com/abseil/abseil-cpp.git libraries/decoder_av1/src/main/jni/libgav1/third_party/abseil-cpp

      - name: Inject C++17 Standard
        run: |
          sed -i '1i set(CMAKE_CXX_STANDARD 17)\nset(CMAKE_CXX_STANDARD_REQUIRED ON)' libraries/decoder_av1/src/main/jni/CMakeLists.txt
          sed -i '1i set(CMAKE_CXX_STANDARD 17)\nset(CMAKE_CXX_STANDARD_REQUIRED ON)' libraries/decoder_av1/src/main/jni/libgav1/CMakeLists.txt

      - name: Compile Real AAR
        run: ./gradlew :lib-decoder-av1:assembleRelease --info

      - name: Upload Finished Real AAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: media3-decoder-gav1-v1
          path: "**/*.aar"
