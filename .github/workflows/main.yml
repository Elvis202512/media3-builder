name: Build Media3 Decoder AV1 Real
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Media3 Source
        uses: actions/checkout@v4
        with:
          repository: 'androidx/media'
          ref: '1.5.1'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install Compilers (Ninja, nasm)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build nasm

      - name: Force Install Stable CMake 3.22 & Nuke Buggy Versions
        run: |
          echo "=== 1. Installation de CMake 3.22.1 (la version recommandée par Google) ==="
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "cmake;3.22.1"
          
          echo "=== 2. Verrouillage de la version dans les propriétés Gradle ==="
          echo "cmake.dir=${ANDROID_HOME}/cmake/3.22.1" >> local.properties
          
          echo "=== 3. Nettoyage radical des CMake pré-installés défectueux ==="
          sudo rm -rf /usr/local/lib/android/sdk/cmake/3.31.5
          sudo rm -rf /usr/local/lib/android/sdk/cmake/4.1.2

      - name: Clone Google libgav1 & Abseil Dependencies
        run: |
          echo "=== 1. Clonage de libgav1 ==="
          git clone --depth 1 https://chromium.googlesource.com/codecs/libgav1 libraries/decoder_av1/src/main/jni/libgav1
          
          echo "=== 2. Clonage d'Abseil ==="
          mkdir -p libraries/decoder_av1/src/main/jni/libgav1/third_party
          git clone --depth 1 https://github.com/abseil/abseil-cpp.git libraries/decoder_av1/src/main/jni/libgav1/third_party/abseil-cpp

      - name: Force Lock C++17 Standard (Override Gradle)
        run: |
          echo "=== Forçage absolu du C++17 dans le cache CMake ==="
          sed -i '1i set(CMAKE_CXX_STANDARD 17 CACHE STRING "" FORCE)\nset(CMAKE_CXX_STANDARD_REQUIRED ON CACHE BOOL "" FORCE)' libraries/decoder_av1/src/main/jni/CMakeLists.txt
          sed -i '1i set(CMAKE_CXX_STANDARD 17 CACHE STRING "" FORCE)\nset(CMAKE_CXX_STANDARD_REQUIRED ON CACHE BOOL "" FORCE)' libraries/decoder_av1/src/main/jni/libgav1/CMakeLists.txt

      - name: Compile Real AAR with Native Libs
        run: ./gradlew :lib-decoder-av1:assembleRelease --info

      - name: Upload Finished Real AAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: media3-decoder-gav1-1.5.1
          path: |
            **/*.aar

      - name: Print All Possible Error Logs on Failure
        if: failure()
        run: |
          echo "=== [DIAGNOSTIC] EXTRACTION COMPLÈTE DES RAPPORTS DE CONFIGURATION ==="
          find libraries/decoder_av1/ -name "CMakeConfigureLog.yaml" -exec cat {} \; || true
          find libraries/decoder_av1/ -name "CMakeError.log" -exec cat {} \; || true
